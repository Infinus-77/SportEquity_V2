{% extends "base.html" %}
{% block title %}Create Athlete Profile - SportEquity{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-3">
    <!-- ── Banner ─────────────────────────────────────────── -->
    <div class="page-banner mb-4">
        <img src="{{ url_for('static', filename='img/training_action.png') }}" alt="Create Athlete">
        <div class="banner-overlay">
            <div class="banner-text">
                <h3>Athlete Management</h3>
                <p>Register a new athlete to the platform</p>
            </div>
        </div>
    </div>

    <!-- Create Athlete Section -->
    <div class="row justify-content-center stagger-fade">
        <div class="col-lg-10">
            <div class="card card-interactive">
                <div class="card-header text-white" style="background-color: var(--success);"><h5 class="mb-0"><i class="bi bi-person-plus-fill"></i> Create New Athlete Profile</h5></div>
                <div class="card-body p-5">
                    <form method="POST" action="{{ url_for('admin_create_athlete') }}">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Full Name <span class="text-danger">*</span></label>
                                <input type="text" name="full_name" class="form-control form-control-lg bg-surface" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Email Address <span class="text-danger">*</span></label>
                                <input type="email" name="email" class="form-control form-control-lg bg-surface" required>
                                <div class="form-text">Will be used for the athlete to log in</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Temporary Password <span class="text-danger">*</span></label>
                                <input type="password" name="password" class="form-control form-control-lg bg-surface" required minlength="6">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Age</label>
                                <input type="number" name="age" class="form-control form-control-lg bg-surface">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted text-uppercase">Gender</label>
                                <select name="gender" class="form-select form-select-lg bg-surface">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted text-uppercase">Sport Specialization</label>
                                <input type="text" name="sport" class="form-control form-control-lg bg-surface" placeholder="e.g., Athletics, Football">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted text-uppercase">Region / Location</label>
                                <input type="text" name="region" class="form-control form-control-lg bg-surface">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold small text-muted text-uppercase">Profile Visibility</label>
                                <select name="visibility" class="form-select form-select-lg bg-surface">
                                    <option value="private">Private (Only me)</option>
                                    <option value="trainer" selected>Trainer Only (Recommended)</option>
                                    <option value="public">Public (Anyone)</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold small text-muted text-uppercase">Biography</label>
                                <textarea name="bio" class="form-control bg-surface" rows="5" placeholder="Brief history and background for the athlete..."></textarea>
                            </div>
                            <div class="col-12 text-end mt-4">
                                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary px-4 fw-bold me-2" style="border-radius: var(--radius-md);">Cancel</a>
                                <button type="submit" class="btn btn-success fw-bold shadow-sm px-5" style="border-radius: var(--radius-md);">
                                    <i class="bi bi-person-plus"></i> Create Athlete Profile
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <i class="bi bi-person-plus-fill card-icon-float" style="color: rgba(34,197,94,0.1); font-size: 8rem; right: -1rem; top: 1rem;"></i>
            </div>
        </div>
    </div>
</div>
{% endblock %}
