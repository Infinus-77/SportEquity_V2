{% extends "base.html" %}
{% block title %}Sign In — SportEquity{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="auth-card">
                    <div class="auth-logo">Sport<span>Equity</span></div>
                    <div class="auth-tagline">AI-Powered Sports Inclusion Platform</div>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Your password" required>
                        </div>
                        <button type="submit" class="btn w-100 py-2 mb-3" style="background:var(--accent);color:var(--cta-text);font-weight:700;font-size:0.95rem;">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center" style="color:var(--ink-muted);font-size:0.875rem;">
                        Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--primary-container);font-weight:600;">Create one free</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
